name: Onelap to Strava Auto Sync

on:
  schedule:
    - cron: '23 0-14 * * *' 
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 直接打包下载原作者的全部源码
        uses: actions/checkout@v4
        with:
          repository: 'yintianan/onelap-strava-sync'

      - name: 准备 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 照着作者的完整清单，一次性安装所有零件！
        run: pip install -r requirements-dev.txt
        
      - name: 从保险箱读取账号密码
        run: |
          echo "ONELAP_USERNAME=${{ secrets.ONELAP_USERNAME }}" >> .env
          echo "ONELAP_PASSWORD=${{ secrets.ONELAP_PASSWORD }}" >> .env
          echo "STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}" >> .env
          echo "STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }}" >> .env
          echo "STRAVA_REFRESH_TOKEN=${{ secrets.STRAVA_REFRESH_TOKEN }}" >> .env
          
      - name: 启动本地保底程序，执行同步！
        run: python run_sync.py
